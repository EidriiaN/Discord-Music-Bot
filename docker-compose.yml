# Discord Music Bot - Docker Compose for Portainer Stacks
# Deploy as a "Stack" in Portainer

version: '3.8'

services:
  music-bot:
    build: .
    image: discord-music-bot:latest
    container_name: discord-music-bot
    restart: unless-stopped
    
    # Environment variables - Pass these in Portainer's Stack UI
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - PO_TOKEN=${PO_TOKEN}
      - VISITOR_DATA=${VISITOR_DATA}
      - YOUTUBE_COOKIES=${YOUTUBE_COOKIES}
    
    # Named volumes for persistence (minimal data, but good practice)
    volumes:
      - bot_data:/app/data

    # Healthcheck ensures Portainer can monitor if the bot is actually running
    healthcheck:
      # This checks if the node process is running without needing pgrep
      test: ["CMD-SHELL", "ps aux | grep 'node src/index.js' | grep -v grep || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 20s

    # Resource management for shared VPS environments
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot_data:
    driver: local
