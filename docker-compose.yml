version: '3.8'

services:
  music-bot:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: discord-music-bot
    restart: unless-stopped
    # No external volumes needed! Everything is in the .env/Env section
    environment:
      - NODE_OPTIONS=--max-old-space-size=2048
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"
