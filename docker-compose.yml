# Discord Music Bot - Docker Compose for Portainer
# Deploy as a Stack in Portainer

services:
  discord-music-bot:
    build: .
    image: discord-music-bot:latest
    container_name: discord-music-bot
    restart: unless-stopped
    environment:
      # Required - Discord credentials
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      
      # YouTube authentication (Base64 encoded for Portainer)
      - PO_TOKEN=${PO_TOKEN}
      - VISITOR_DATA=${VISITOR_DATA}
      
      # Optional - YouTube cookies (Base64 encoded)
      - YOUTUBE_COOKIES=${YOUTUBE_COOKIES}
    
    # Healthcheck to ensure bot stays alive
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
