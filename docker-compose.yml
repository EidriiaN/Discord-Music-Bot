version: '3.8'

services:
  music-bot:
    build: 
      context: .
      dockerfile: Dockerfile
    image: discord-music-bot:latest
    container_name: discord-music-bot
    restart: unless-stopped
    
    # Environment variables - configure in Portainer or via .env file
    env_file:
      - .env
    environment:
      # Required: Discord Bot Token
      - DISCORD_TOKEN=${DISCORD_TOKEN:?DISCORD_TOKEN is required}
      # Required: Discord Application/Client ID
      - CLIENT_ID=${CLIENT_ID:-}
      # YouTube Authentication (2026 bypass)
      - PO_TOKEN=${PO_TOKEN:-}
      - VISITOR_DATA=${VISITOR_DATA:-}
      # Optional: Base64-encoded cookies (alternative to file mount)
      - YOUTUBE_COOKIES=${YOUTUBE_COOKIES:-}
      # Node.js memory configuration
      - NODE_OPTIONS=--max-old-space-size=2048
    
    # Volume mounts for persistent data
    volumes:
      # Mount cookies.txt if using file-based auth (read-only for security)
      - ./cookies.txt:/app/cookies.txt:ro
    
    # Healthcheck for Portainer monitoring
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Network configuration
    networks:
      - discord-bot-network
    
    # Portainer labels for stack organization
    labels:
      - "com.docker.compose.project=discord-music-bot"
      - "description=Discord Music Bot with YouTube 2026 bypass"
      # Uncomment if using Watchtower for auto-updates
      # - "com.centurylinklabs.watchtower.enable=true"

networks:
  discord-bot-network:
    driver: bridge
    name: discord-bot-network
