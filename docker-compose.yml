# Discord Music Bot - Docker Compose for Portainer Stacks
# Deploy as a "Stack" in Portainer

version: '3.8'

services:
  music-bot:
    build: .
    image: discord-music-bot:latest
    container_name: discord-music-bot
    restart: unless-stopped
    
    # REQUIRED for Linux Homelabs: Use host network mode for voice
    # This resolves UDP "hole punching" issues behind NAT/Bridge
    network_mode: host
    
    # Environment variables - Pass these in Portainer's Stack UI
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - PO_TOKEN=${PO_TOKEN}
      - VISITOR_DATA=${VISITOR_DATA}
      - YOUTUBE_COOKIES=${YOUTUBE_COOKIES}
    
    # Named volumes for persistence
    volumes:
      - bot_data:/app/data

    # Healthcheck
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node src/index.js' > /dev/null || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot_data:
    driver: local
